configuration:
  WYZE_EMAIL:
    name: Wyze email
    description: Required. Enter the email address for your Wyze account.
  WYZE_PASSWORD:
    name: Wyze password
    description: Required. Enter the password for your Wyze account.
  API_ID:
    name: Key ID
    description: Required. Enter your Wyze developer Key ID. Used together with API key.
  API_KEY:
    name: API key
    description: Required. Enter your Wyze developer API key. Used together with Key ID.
  WB_IP:
    name: WebRTC advertised IP
    description: Advanced. Override the IP address announced to WebRTC clients. Leave blank unless WebRTC works locally but fails from other devices.
  REFRESH_TOKEN:
    name: Refresh Token
    description: Advanced. Optional existing refresh token for authentication.
  ACCESS_TOKEN:
    name: Access Token
    description: Advanced. Optional existing access token for authentication.
  TOTP_KEY:
    name: TOTP Key
    description: Optional. Only needed if your Wyze account uses TOTP-based MFA.
  NET_MODE:
    name: Allowed Net Modes
    description: Optional. Limit how cameras connect: LAN only, P2P only, or either.
  SNAPSHOT:
    name: Snapshot Mode
    description: How should a snapshot be taken (API or RTSP). The number is how often in seconds.
  SNAPSHOT_FORMAT:
    name: Snapshot File Name Pattern
    description: The directory and file name pattern for saving snapshots. Use {cam_name} or {CAM_NAME} to insert the camera slug
  SNAPSHOT_KEEP:
    name: Snapshot Retention
    description: How long to retain snapshots (e.g. 10h for 10 hours, 5d for 5 days)
  IMG_TYPE:
    name: Snapshot image type
    description: Optional. Save snapshots as JPG or PNG. Defaults to JPG.
  IMG_DIR:
    name: Snapshot Directory
    description: Specify the base directory for the snapshots. Defaults to img (and will be at /media/wyze/img)
  DOMAIN:
    name: Stream host name
    description: Optional. Host name used when the UI shows stream URLs. Defaults to your Home Assistant host name.
  ENABLE_AUDIO:
    name: Enable audio by default
    description: Optional. Include audio on camera streams unless a camera-specific setting overrides it.
  ON_DEMAND:
    name: Connect on demand
    description: Recommended. Keep cameras disconnected until someone watches or requests a stream. Turn off only if you want persistent camera connections.
  MOTION_API:
    name: Use Wyze motion events
    description: Optional. Monitor motion events reported by Wyze cameras. This sets the default for all cameras.
  MOTION_INT:
    name: Motion Check Interval
    description: Number of seconds between motion checks. Defaults to 1.1 
  MOTION_START:
    name: Start Stream when Motion Detected
    description: If true, the camera stream will be automatically started when motion events occur
  MOTION_WEBHOOKS:
    name: API Motion Webhook
    description: Optional. Send a webhook when motion is detected. Example: http://localhost/motion?cam={cam_name}. This sets the default for all cameras.
  SUBSTREAM:
    name: Create substream by default
    description: Optional. Publish an extra lower-bandwidth stream at /camera-name-sub for cameras that support it.
  AUDIO_CODEC:
    name: Audio Codec
    description: Cams with PCM audio will be re-encoded to AAC by default for RTSP compatibility.
  AUDIO_FILTER:
    name: FFmpeg Audio Filter
    description: Requires audio codec to be set to AAC or MP3.
  LLHLS:
    name: Low Latency HLS
    description: If enabled, creates HLS streams that have low-latency protocol active. If true, the HLS stream must be served via https not http
  DISABLE_CONTROL:
    name: Disable Control
    description: Disable camera control from the API/MQTT.
  RTSP_FW:
    name: Firmware RTSP
    description: Proxy additional RTSP stream from official RTSP firmware.
  RECORD_ALL:
    name: Record all cameras by default
    description: Optional. Record camera streams with MediaMTX unless a camera-specific setting overrides it.
  RECORD_KEEP:
    name: Recording Retention
    description: How long to retain recordings (e.g. 10h for 10 hours, 5d for 5 days). Defaults to 0s (never discard)
  RECORD_LENGTH:
    name: Recording Length
    description: How long each recording is before starting a new file. Defaults to 60s
  RECORD_PATH:
    name: Recording Directory Pattern
    description: The directory pattern for saved recordings. This defaults to /media/wyze/recordings/{cam_name}/%Y/%m/%d
  RECORD_FILE_NAME:
    name: Recording File Name Pattern
    description: The file name pattern for saved recordings. Use {cam_name} or {CAM_NAME} to insert the camera slug. Defaults to %Y-%m-%d-%H-%M-%S
  MQTT:
    name: Enable MQTT
    description: Optional. Publish device state, events, and motion updates to MQTT.
  MQTT_HOST:
    name: MQTT host
    description: Optional. MQTT broker address, for example 192.168.1.10:1883. Leave blank to rely on the Home Assistant MQTT service when available.
  MQTT_AUTH:
    name: MQTT Login
    description: Optional. MQTT username and password in the format user:password.
  MQTT_TOPIC:
    name: MQTT Topic
    description: The topic where camera states and motion are announced. Defaults to wyzebridge
  MQTT_DTOPIC:
    name: MQTT Discovery Topic
    description: The topic where MQTT discovery messages for cameras is announced. If blank, no discovery messages are emitted
  MQTT_RETRIES:
    name: MQTT Retries
    description: How many attempts to publish messages. Defaults to 3
  FILTER_NAMES:
    name: Filter cameras by name
    description: Optional. If set, only cameras with these names will be managed.
  FILTER_MODELS:
    name: Filter cameras by camera model
    description: Optional. If set, only cameras with these model names will be managed.
  FILTER_MACS:
    name: Filter cameras by MAC address
    description: Optional. If set, only cameras with these MAC addresses will be managed.
  FILTER_BLOCK:
    name: Invert Filter
    description: Block cameras in filter lists (instead of enabling)
  ROTATE_DOOR:
    name: Rotate Doorbells
    description: Will rotate video 90 degrees clockwise.
  H264_ENC:
    name: H.264 Encoder
    description: Specify a hardware encoder for FFmpeg
  FORCE_ENCODE:
    name: Force Re-encoding
    description: Ensure the streams are encoded in compatible format
  IGNORE_OFFLINE:
    name: Ignore Offline Camera
  OFFLINE_TIME:
    name: Cooldown for Offline
    description: How long in seconds to wait between checks of an offline camera. Defaults to 10
  FRESH_DATA:
    name: Refresh API Camera
    description: Ignores local cache of cameras and grabs the list from the API
  URI_MAC:
    name: Add MAC to Camera Name
    description: Adds the last 4 characters of the Camera's MAC to the camera URI
  URI_SEPARATOR:
    name: URI Separator
    description: Replace all whitespace or hyphens with this character in URI
  QUALITY:
    name: Default main stream quality
    description: Optional. Requested main stream quality for all cameras. Use values like SD30 or HD180.
  SUB_QUALITY:
    name: Default substream quality
    description: Optional. Requested quality for supported substreams. Use values like SD30 or HD180.
  FORCE_FPS:
    name: Force FPS
    description: Sets the default frames-per-second for all cameras
  SUB_RECORD:
    name: Record substream by default
    description: Optional. Record supported substreams when they are enabled.
  FFMPEG_FLAGS:
    name: FFmpeg Flags
    description: Additional flags to pass FFmpeg for all cameras
  FFMPEG_CMD:
    name: FFmpeg Command
    description: Set a custom FFmpeg command instead of the default. Use {cam_name} or {CAM_NAME} or {audio_in} to insert the camera slug
  LOG_LEVEL:
    name: Log Level
    description: Sets the level of logging from FATAL (only terminal errors) to DEBUG (excessive detail)
  LOG_FILE:
    name: Write log file
    description: Optional. Save bridge logs to /config/logs/wyze-bridge.log.
  LOG_TIME:
    name: Show timestamps in logs
    description: Optional. Add timestamps to log lines.
  FFMPEG_LOGLEVEL:
    name: FFmpeg Log Level
    description: Sets the level of logging for the FFmpeg helper from quiet (almost nothing) to debug (excessive detail)
  IGNORE_RES:
    name: Frame Size Override
    description: Allows additional frame sizes for video stream
  BOA_ENABLED:
    name: Enable BOA HTTP
    description: Advanced. Enable the camera HTTP server on supported cameras. Requires LAN access and an SD card.
  BOA_INTERVAL:
    name: Boa Keep Alive
    description: The number of seconds between photos/keep alive. Defaults to 20
  BOA_TAKE_PHOTO:
    name: Interval Photo
    description: Take a photo on the camera on Boa Keep Alive Interval.
  BOA_PHOTO:
    name: Pull Photo (MQTT Motion Alerts)
    description: Pull the HQ photo from the SD card via BOA.
  BOA_ALARM:
    name: Pull Alarm (MQTT Motion Alerts)
    description: Pull alarm image from the SD card via BOA.
  BOA_MOTION:
    name: Webhook on BOA Motion
    description: Make a Webhook/HTTP request to any url. e.g., http://localhost/motion?cam={cam_name}
  BOA_COOLDOWN:
    name: Motion Cooldown
    description: Number of seconds to keep the motion flag set to true before resetting it. Defaults to 20
  CAM_OPTIONS:
    name: Camera Specific Options
    description: Optional. Per-camera overrides. Use this for camera-specific stream mode, quality, recording, or motion settings.
  MEDIAMTX:
    name: MediaMTX config
    description: Use `=` to specify the value and use `_` in place of spaces. For example MTX_LOGLEVEL. See documentation for details
  WB_HLS_URL:
    name: Custom HLS URL
  WB_RTMP_URL:
    name: Custom RTMP URL
  WB_RTSP_URL:
    name: Custom RTSP URL
  WB_WEBRTC_URL:
    name: Custom WebRTC URL
  WB_AUTH:
    name: Require Web UI login
    description: Recommended. Require a username and password for the Web UI and bridge APIs.
  WB_USERNAME:
    name: WebUI Username
    description: Optional. Used only when Web UI authentication is enabled.
  WB_PASSWORD:
    name: WebUI Password
    description: Optional. Used only when Web UI authentication is enabled.
  STREAM_AUTH:
    name: Add stream users
    description: Advanced. Add stream-only users for specific cameras. See the examples in the docs for the required format.
  STUN_SERVER:
    name: STUN Server
    description: Optional. Override the STUN server used for WebRTC. Example: stun:stun.l.google.com:19302.
  LATITUDE:
    name: Local Latitude
    description: Used to compute sunset/sunrise for snapshots
  LONGITUDE:
    name: Local Longitude
    description: Used to compute sunset/sunrise for snapshots
