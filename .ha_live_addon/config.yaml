name: Docker Wyze Bridge (Dev Build)
description: Local staging build of Docker Wyze Bridge for SSH-driven validation before production promotion.
slug: docker_wyze_bridge_dev
url: https://github.com/thatdaveguy1/docker-wyze-bridge
version: 4.1.0-dev
stage: stable
arch:
  - armv7
  - aarch64
  - amd64
startup: application
boot: auto
apparmor: false
hassio_api: true
host_network: true
ports:
  59554/tcp: 59554
  59888/tcp: 59888
  59889/tcp: 59889
  60997/tcp: 60997
  55000/tcp: 55000
  19554/tcp: 19554
ports_description:
  59554/tcp: RTSP (WebRTC-backed) rtsp://localhost:59554/camera-name
  59888/tcp: HLS http://localhost:59888/camera-name/stream.m3u8
  59889/tcp: WebRTC/WHEP http://localhost:59889/camera-name
  60997/tcp: MediaMTX API
  55000/tcp: Web UI http://localhost:55000
  19554/tcp: go2rtc RTSP rtsp://localhost:19554/camera-name
map:
  - addon_config:rw
  - media:rw
  - ssl:ro
services:
  - mqtt:want
video: true
ingress: true
ingress_port: 55000
panel_icon: mdi:bridge
watchdog: http://[HOST]:[PORT:55000]/health
options:
  WYZE_EMAIL: ""
  WYZE_PASSWORD: ""
  API_ID: ""
  API_KEY: ""
  ENABLE_AUDIO: true
  ON_DEMAND: true
  MOTION_API: true
  CAM_OPTIONS: []
  MEDIAMTX: []
  CONNECT_TIMEOUT: 60
  CONNECT_RETRIES: 3
  CONNECT_RETRY_DELAY: 2.0
schema:
  WYZE_EMAIL: email
  WYZE_PASSWORD: password
  API_ID: match(\s*[a-fA-F0-9-]{36}\s*)
  API_KEY: match(\s*[a-zA-Z0-9]{60}\s*)
  WB_IP: str?
  REFRESH_TOKEN: str?
  ACCESS_TOKEN: str?
  TOTP_KEY: str?
  NET_MODE: list(LAN|P2P|ANY)?
  SNAPSHOT: list(API|RTSP|RTSP15|RTSP30|RTSP60|RTSP180|RTSP300|Disable)?
  SNAPSHOT_FORMAT: str?
  SNAPSHOT_KEEP: str?
  IMG_TYPE: list(jpg|png)?
  IMG_DIR: str?
  ENABLE_AUDIO: bool?
  ON_DEMAND: bool?
  MOTION_API: bool?
  MOTION_INT: float(1.1,)?
  MOTION_START: bool?
  MOTION_WEBHOOKS: str?
  SUBSTREAM: bool?
  AUDIO_CODEC: list(COPY|AAC|LIBOPUS|MP3|PCM_MULAW|PCM_ALAW)?
  AUDIO_FILTER: str?
  LLHLS: bool?
  DISABLE_CONTROL: bool?
  RTSP_FW: bool?
  RECORD_ALL: bool?
  RECORD_KEEP: str?
  RECORD_LENGTH: str?
  RECORD_PATH: str?
  RECORD_FILE_NAME: str?
  MQTT: bool?
  MQTT_HOST: str?
  MQTT_AUTH: str?
  MQTT_TOPIC: str?
  MQTT_DTOPIC: str?
  MQTT_RETRIES: int?
  FILTER_NAMES: str?
  FILTER_MODELS: str?
  FILTER_MACS: str?
  FILTER_BLOCK: bool?
  ROTATE_DOOR: bool?
  H264_ENC: str?
  FORCE_ENCODE: bool?
  IGNORE_OFFLINE: bool?
  OFFLINE_TIME: int?
  FRESH_DATA: bool?
  URI_MAC: bool?
  URI_SEPARATOR: list(-|_|#)?
  QUALITY: str?
  SUB_QUALITY: str?
  FORCE_FPS: int?
  SUB_RECORD: bool?
  FFMPEG_FLAGS: str?
  FFMPEG_CMD: str?
  LOG_LEVEL: list(FATAL|ERROR|WARNING|INFO|DEBUG)?
  LOG_FILE: bool?
  LOG_TIME: bool?
  FFMPEG_LOGLEVEL: list(quiet|panic|fatal|error|warning|info|verbose|debug)?
  IGNORE_RES: int?
  BOA_ENABLED: bool?
  BOA_INTERVAL: int?
  BOA_TAKE_PHOTO: bool?
  BOA_PHOTO: bool?
  BOA_ALARM: bool?
  BOA_MOTION: str?
  BOA_COOLDOWN: int?
  CAM_OPTIONS:
    - CAM_NAME: str?
      AUDIO: bool?
      FFMPEG: str?
      LIVESTREAM: str?
      NET_MODE: str?
      ROTATE: bool?
      QUALITY: str?
      SUB_QUALITY: str?
      FORCE_FPS: int?
      RECORD: bool?
      SUB_RECORD: bool?
      SUBSTREAM: bool?
      MOTION_WEBHOOKS: str?
  CONNECT_TIMEOUT: int?
  CONNECT_RETRIES: int?
  CONNECT_RETRY_DELAY: float?
  FORCE_V4_PARALLEL: bool?
  MEDIAMTX:
    - match(^\w+=.*)?
  DOMAIN: str?
  WB_HLS_URL: url?
  WB_RTMP_URL: url?
  WB_RTSP_URL: url?
  WB_WEBRTC_URL: url?
  WB_AUTH: bool?
  WB_USERNAME: str?
  WB_PASSWORD: str?
  STREAM_AUTH: str?
  STUN_SERVER: str?
  LATITUDE: float?
  LONGITUDE: float?
